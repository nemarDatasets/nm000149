abstract: We show that persons with spinal cord injury (SCI) retain decodable neural correlates of attempted arm and hand
  movements. We investigated hand open, palmar grasp, lateral grasp, pronation, and supination in 10 persons with cervical
  SCI. Discriminative movement information was provided by the time-domain of low-frequency electroencephalography (EEG) signals.
  Based on these signals, we obtained a maximum average classification accuracy of 45% (chance level was 20%) with respect
  to the five investigated classes. Pattern analysis indicates central motor areas as the origin of the discriminative signals.
  Furthermore, we introduce a proof-of-concept to classify movement attempts online in a closed loop, and tested it on a person
  with cervical SCI. We achieved here a modest classification performance of 68.4% with respect to palmar grasp vs hand open
  (chance level 50%).
